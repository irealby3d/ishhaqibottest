<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korporativ Tizim</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 15px; background: var(--tg-theme-bg-color, #f4f4f5); color: var(--tg-theme-text-color, #000); }
        .container { max-width: 500px; margin: 0 auto; background: var(--tg-theme-bg-color, #fff); border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .tabs { display: flex; margin-bottom: 20px; background: #e0e0e0; border-radius: 8px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; font-weight: bold; cursor: pointer; color: #333; font-size: 14px; }
        .tab-btn.active { background: #2481cc; color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #adminTabBtn { display: none; background: #ff9800; color: white; }
        #adminTabBtn.active { background: #e65100; }

        .sub-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .sub-btn { flex: 1; padding: 8px; text-align: center; font-weight: bold; background: #eee; border-radius: 6px; cursor: pointer; color:#333; font-size: 13px;}
        .sub-btn.active { background: #4a148c; color: #fff; }

        input, select, textarea { width: 100%; box-sizing: border-box; padding: 12px; margin-top: 6px; border: 1px solid #ccc; border-radius: 8px; background: #fafafa; font-size: 15px; margin-bottom: 5px;}
        button.btn-main { width: 100%; padding: 14px; margin-top: 10px; background: #2e8b57; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .summary-cards { display: flex; gap: 10px; margin-bottom: 20px; }
        .card { flex: 1; padding: 15px; border-radius: 8px; text-align: center; color: #fff; font-weight: bold; }
        .card.uzs { background: linear-gradient(135deg, #43a047, #2e7d32); }
        .card.usd { background: linear-gradient(135deg, #fb8c00, #e65100); }
        .card.admin { background: linear-gradient(135deg, #8e24aa, #4a148c); width: 100%; margin-bottom: 10px; box-sizing: border-box;}
        
        .history-item, .admin-item { background: #fff; border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .admin-item { background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .del-btn { background: #e53935; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; margin-top: 8px;}
        
        .role-badge { background: #4a148c; color: #fff; padding: 3px 8px; border-radius: 12px; font-size: 11px; }
        .role-badge.boss { background: #d84315; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <div class="tab-btn active" id="btn-add" onclick="switchTab('addTab', 'btn-add')">➕ Qo'shish</div>
            <div class="tab-btn" id="btn-report" onclick="switchTab('reportTab', 'btn-report')">📊 Hisobotim</div>
            <div class="tab-btn" id="adminTabBtn" onclick="switchTab('adminTab', 'adminTabBtn')">👑 ADMIN</div>
        </div>

        <div id="addTab" class="tab-content active">
            <h3 id="greeting">Buxgalteriya</h3>
            <form id="financeForm">
                <input type="number" id="amount" required placeholder="Summa (Masalan: 500000)">
                <select id="currency" onchange="toggleRate()"><option value="UZS">So'm (UZS)</option><option value="USD">Dollar (USD)</option></select>
                <div id="rateDiv" style="display: none;"><input type="number" id="rate" placeholder="Kurs (Masalan: 12600)"></div>
                <textarea id="comment" rows="2" placeholder="Izoh"></textarea>
                <button type="submit" class="btn-main" id="submitBtn">Saqlash</button>
            </form>
            <div id="status" style="text-align:center; margin-top:10px; font-weight:bold;"></div>
        </div>

        <div id="reportTab" class="tab-content">
            <div class="summary-cards">
                <div class="card uzs"><div>Mening So'm</div><div id="myUzs">0</div></div>
                <div class="card usd"><div>Mening Dollar</div><div id="myUsd">$0</div></div>
            </div>
            <h4>Oxirgi amallarim</h4>
            <div id="myHistory"></div>
        </div>

        <div id="adminTab" class="tab-content">
            
            <div class="sub-tabs" id="bossNav" style="display: none;">
                <div class="sub-btn active" id="btn-xarajat" onclick="switchAdminSub('adminDataArea', 'btn-xarajat')">Xarajatlar</div>
                <div class="sub-btn" id="btn-rollar" onclick="switchAdminSub('adminRolesArea', 'btn-rollar'); loadAdmins();">Rollar</div>
            </div>

            <div id="adminDataArea">
                <div class="card admin">
                    <div style="font-size: 12px; opacity: 0.8;">Kompaniya bo'yicha Umumiy</div>
                    <div id="totalCompanyUzs" style="font-size: 20px; margin-top: 5px;">0 UZS</div>
                    <div id="totalCompanyUsd" style="font-size: 20px; color: #ffd54f;">$0</div>
                </div>
                <input type="text" id="searchInput" placeholder="🔎 Ism yoki izohni qidiring..." onkeyup="filterAdminList()">
                <div id="adminList"></div>
            </div>

            <div id="adminRolesArea" style="display: none;">
                <h4 style="margin-top:0;">Yangi tayinlash</h4>
                <input type="text" id="newAdminId" placeholder="Telegram ID (Majburiy)">
                <input type="text" id="newAdminName" placeholder="Xodimning ismi">
                <select id="newAdminRole">
                    <option value="Admin">Oddiy Admin (Faqat ko'radi va o'chiradi)</option>
                    <option value="Boss">Boshliq (Adminlarni boshqaradi)</option>
                </select>
                <button class="btn-main" onclick="addAdmin()" style="margin-top:5px; background:#4a148c;">Tizimga Qo'shish</button>
                <div id="adminStatus" style="text-align:center; font-weight:bold; margin-top:5px;"></div>
                
                <h4>Tizimdagi Adminlar</h4>
                <div id="rolesList"></div>
            </div>

        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Telegram user ma'lumotlarini o'qish logikasi mutlaqo yangilandi.
        // Endi tizim username/id'sini o'zi taniydi.
        const user = tg.initDataUnsafe?.user;
        const employeeName = user ? `${user.first_name} ${user.last_name || ''}`.trim() : "Noma'lum Xodim";
        const telegramId = user ? String(user.id) : "Yo'q";
        
        document.getElementById('greeting').innerText = `👋 Salom, ${user ? user.first_name : 'Xodim'}!`;

        let globalAdminData = []; 
        let isSuperBoss = false;

        // INIT (ID bo'yicha rol tekshirish logikasi)
        window.onload = async () => {
            try {
                // Tepadagi G-Script URL o'zgaruvchisi tushunishni osonlashtirish uchun diagarmma trigger qilindi.
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "init", telegramId: telegramId }) });
                const data = await res.json();
                if (data.success) {
                    renderMyHistory(data.data);
                    // Agar admin bo'lsa, Admin tugmasini yoqamiz
                    if (data.isAdmin) document.getElementById('adminTabBtn').style.display = 'block';
                    // Agar Boss bo'lsa, sub-navigatsiyani yoqamiz
                    if (data.isBoss) {
                        isSuperBoss = true;
                        document.getElementById('bossNav').style.display = 'flex'; // Rollar menyusini ochish
                    }
                }
            } catch (e) { console.error(e); }
        };

        // NAVIGATSIYA
        function switchTab(tabId, btnId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById(btnId).classList.add('active');
            if (tabId === 'adminTab') loadAdminData();
        }

        function switchAdminSub(areaId, btnId) {
            document.getElementById('adminDataArea').style.display = 'none';
            document.getElementById('adminRolesArea').style.display = 'none';
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(areaId).style.display = 'block';
            document.getElementById(btnId).classList.add('active');
        }

        function toggleRate() { document.getElementById('rateDiv').style.display = document.getElementById('currency').value === 'USD' ? 'block' : 'none'; }

        // MENING HISOBOTIM
        function renderMyHistory(records) {
            let tUZS = 0, tUSD = 0, html = '';
            records.reverse().forEach(r => {
                tUZS += Number(r.amountUZS) || 0; tUSD += Number(r.amountUSD) || 0;
                html += `<div class="history-item"><div><div style="font-size:12px; color:#888;">📅 ${r.date}</div><div>📝 ${r.comment}</div></div><div style="font-weight:bold;">${r.amountUZS > 0 ? `<span style="color:#2e7d32;">${r.amountUZS} UZS</span><br>` : ''}${r.amountUSD > 0 ? `<span style="color:#e65100;">$${r.amountUSD}</span>` : ''}</div></div>`;
            });
            document.getElementById('myUzs').innerText = tUZS.toLocaleString(); document.getElementById('myUsd').innerText = '$' + tUSD.toLocaleString();
            document.getElementById('myHistory').innerHTML = html || "<p style='text-align:center;'>Ma'lumot yo'q</p>";
        }

        // QO'SHISH (Buxgalteriya formasi)
        document.getElementById('financeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); const status = document.getElementById('status');
            let amount = parseFloat(document.getElementById('amount').value); let currency = document.getElementById('currency').value;
            let rate = parseFloat(document.getElementById('rate').value) || 0; let comment = document.getElementById('comment').value || "Izoh yo'q";
            let amountUZS = currency === 'USD' ? amount * rate : amount; let amountUSD = currency === 'USD' ? amount : 0;
            if (currency === 'USD' && rate < 5000) { alert("Kurs xato!"); return; }
            const date = new Intl.DateFormat('uz-UZ', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(new Date());

            btn.disabled = true; btn.innerText = "Yuborilmoqda...";
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "add", employeeName, telegramId, amountUZS, amountUSD, rate, comment, date }) });
                status.style.color = "green"; status.innerText = "✅ Saqlandi!"; setTimeout(() => { window.location.reload(); }, 1000);
            } catch (err) { status.style.color = "red"; status.innerText = "❌ Xato"; btn.disabled = false; btn.innerText = "Saqlash"; }
        });

        // ================= ADMIN: XARAJATLAR (Smart Search) =================
        async function loadAdminData() {
            document.getElementById('adminList').innerHTML = "<p style='text-align:center;'>Yuklanmoqda... ⏳</p>";
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "admin_get_all", telegramId: telegramId }) });
                const data = await res.json();
                if (data.success) { globalAdminData = data.data; drawAdminUI(globalAdminData); }
            } catch(e) {}
        }

        function filterAdminList() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = globalAdminData.filter(item => (item.name && item.name.toLowerCase().includes(query)) || (item.comment && item.comment.toLowerCase().includes(query)));
            drawAdminUI(filtered);
        }

        function drawAdminUI(records) {
            let tUZS = 0, tUSD = 0, html = '';
            records.forEach(r => {
                tUZS += Number(r.amountUZS) || 0; tUSD += Number(r.amountUSD) || 0;
                html += `<div class="admin-item"><div style="display:flex; justify-content:space-between;"><strong>👤 ${r.name}</strong><span style="color:#888; font-size:12px;">📅 ${r.date}</span></div><div style="margin: 8px 0; color:#333;">📝 ${r.comment}</div><div style="display:flex; justify-content:space-between; align-items:end;"><div>${r.amountUZS > 0 ? `<span style="color:#2e7d32; font-weight:bold;">${r.amountUZS} UZS</span><br>` : ''}${r.amountUSD > 0 ? `<span style="color:#e65100; font-weight:bold;">$${r.amountUSD}</span>` : ''}</div><button class="del-btn" onclick="deleteRecord(${r.rowId})">🗑 O'chirish</button></div></div>`;
            });
            document.getElementById('totalCompanyUzs').innerText = tUZS.toLocaleString() + " UZS";
            document.getElementById('totalCompanyUsd').innerText = "$" + tUSD.toLocaleString();
            document.getElementById('adminList').innerHTML = html;
        }

        async function deleteRecord(rowId) {
            if(!confirm("Haqiqatan ham o'chirmoqchimisiz?")) return;
            // ID bo'yicha serverda xavfsiz rol tekshirish logikasi trigger qilindi.
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "admin_delete", telegramId, rowId }) });
            loadAdminData();
        }

        // ================= BOSS: ROLLAR BOSHQRUVI =================
        async function loadAdmins() {
            document.getElementById('rolesList').innerHTML = "<p style='text-align:center;'>Yuklanmoqda... ⏳</p>";
            try {
                // ID bo'yicha serverda xavfsiz rol tekshirish logikasi trigger qilindi.
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "get_admins", telegramId: telegramId }) });
                const data = await res.json();
                if (data.success) {
                    let html = '';
                    data.data.forEach(r => {
                        html += `<div class="history-item">
                            <div><strong>${r.name}</strong><br><span style="font-size:12px; color:#888;">ID: ${r.tgId}</span></div>
                            <div style="text-align:right;">
                                <span class="role-badge ${r.role==='Boss'?'boss':''}">${r.role}</span><br>
                                <button class="del-btn" onclick="delAdmin(${r.rowId})" style="margin-top:5px;">🗑</button>
                            </div>
                        </div>`;
                    });
                    document.getElementById('rolesList').innerHTML = html;
                }
            } catch(e) {}
        }

        async function addAdmin() {
            const st = document.getElementById('adminStatus');
            const newTgId = document.getElementById('newAdminId').value;
            const newName = document.getElementById('newAdminName').value || "Yangi Admin";
            const newRole = document.getElementById('newAdminRole').value;
            
            if(!newTgId) { st.style.color="red"; st.innerText="ID yozilishi shart!"; return; }
            st.style.color="#888"; st.innerText="Qo'shilmoqda...";

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "add_admin", telegramId, newTgId, newName, newRole }) });
                const data = await res.json();
                if (data.success) {
                    st.style.color="green"; st.innerText="✅ Muvaffaqiyatli qo'shildi!";
                    document.getElementById('newAdminId').value = ''; document.getElementById('newAdminName').value = '';
                    loadAdmins();
                } else { st.style.color="red"; st.innerText="❌ " + (data.error || "Xato"); }
            } catch(e) {}
        }

        async function delAdmin(rowId) {
            if(!confirm("Adminni o'chirishga ishonchingiz komilmi?")) return;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "del_admin", telegramId, rowId }) });
                const data = await res.json();
                if (data.success) { loadAdmins(); } else { alert(data.error); }
            } catch(e) {}
        }
    </script>
</body>
</html>
