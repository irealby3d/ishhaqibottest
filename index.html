<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech ERP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="reportTab" class="tab-content active">
            <h2 id="greeting">Salom, Xodim!</h2>
            <div class="summary-cards">
                <div class="s-card uzs"><div>Jami So'm</div><div id="myUzs">0</div></div>
                <div class="s-card usd"><div>Jami Dollar</div><div id="myUsd">$0</div></div>
            </div>
            <h4>Oxirgi amallarim</h4>
            <div id="myHistory"></div>
        </div>

        <div id="addTab" class="tab-content">
            <div class="card">
                <h3 class="text-center text-green">Yangi Xarajat</h3>
                <form id="financeForm">
                    <input type="number" id="amount" required placeholder="Summa">
                    <select id="currency" onchange="toggleRate()"><option value="UZS">So'm</option><option value="USD">Dollar</option></select>
                    <div id="rateDiv" class="hidden"><input type="number" id="rate" placeholder="Kurs (12600)"></div>
                    <textarea id="comment" rows="2" placeholder="Izoh..."></textarea>
                    <button type="submit" class="btn-main" id="submitBtn">Saqlash</button>
                </form>
                <div id="status" class="status-msg"></div>
            </div>
        </div>

        <div id="adminTab" class="tab-content">
            <div class="sub-tabs" id="bossNav" class="hidden">
                <div class="sub-btn active" onclick="switchAdminSub('adminDataArea', this)">Xarajatlar</div>
                <div class="sub-btn" onclick="switchAdminSub('adminRolesArea', this); loadAdmins();">Rollar</div>
            </div>

            <div id="adminDataArea">
                <div class="card gradient-card">
                    <div>Umumiy Byudjet (Barchasi So'mda)</div>
                    <div id="totalCompanyUzs" class="big-text">0 UZS</div>
                    <button class="btn-export" onclick="exportToCSV()">📥 Hisobotni yuklab olish (CSV)</button>
                </div>
                
                <div class="filter-box">
                    <input type="text" id="searchInput" placeholder="🔎 Ism, izoh yoki sana bo'yicha qidiring..." onkeyup="debounceSearch()">
                </div>
                
                <div id="adminList"></div>
                <div id="pagination" class="pagination"></div>
            </div>

            <div id="adminRolesArea" class="hidden">
                <div class="card">
                    <h4>Yangi Rol Tayinlash</h4>
                    <input type="text" id="newAdminId" placeholder="Telegram ID">
                    <input type="text" id="newAdminName" placeholder="Ism">
                    <select id="newAdminRole"><option value="Admin">Admin</option><option value="Boss">Boss</option></select>
                    <button class="btn-main bg-purple" onclick="addAdmin()">Qo'shish</button>
                    <div id="adminStatus" class="status-msg"></div>
                </div>
                <div id="rolesList"></div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal hidden">
        <div class="modal-content">
            <h3>Tahrirlash</h3>
            <input type="hidden" id="editRowId">
            <input type="number" id="editAmountUZS" placeholder="Summa (UZS)">
            <input type="number" id="editAmountUSD" placeholder="Summa (USD)">
            <input type="number" id="editRate" placeholder="Kurs">
            <textarea id="editComment" rows="2"></textarea>
            <div style="display:flex; gap:10px;">
                <button class="btn-main" onclick="saveEdit()">Saqlash</button>
                <button class="btn-main bg-red" onclick="closeModal()">Bekor qilish</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-report" onclick="switchTab('reportTab', 'nav-report')"><span>📊</span><span>Hisobot</span></div>
        <div class="nav-fab-container"><div class="nav-fab" id="nav-add" onclick="switchTab('addTab', 'nav-add')">➕</div></div>
        <div class="nav-item hidden" id="nav-admin" onclick="switchTab('adminTab', 'nav-admin')"><span>👑</span><span>Admin</span></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
