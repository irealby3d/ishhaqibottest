name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Frontend Syntax
        run: |
          node --check config.js
          node --check ui.js
          node --check employee.js
          node --check admin.js
          node --check export.js
          node --check actions.js
          node --check dashboard.js
          node --check detail_modal.js
          node --check roles.js

      - name: Check Apps Script Syntax
        run: |
          for f in gsheetscode/*.gs; do
            cp "$f" "/tmp/$(basename "$f").js"
            node --check "/tmp/$(basename "$f").js"
          done

      - name: Run Date Tests
        run: node tests/date-parse.test.js
